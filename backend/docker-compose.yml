version: "3.8"

services:
  expense-tracker-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-backend
    ports:
      - "3001:3001"
    environment:
      # Node environment
      NODE_ENV: production
      PORT: 3001

      # AWS Configuration
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}

      # Cognito Configuration
      COGNITO_USER_POOL_ID: us-east-1_ABceXgGSa
      COGNITO_CLIENT_ID: 3u5q66p8p8a4amncvouesakb1l

      # DynamoDB Configuration
      TABLE_NAME: expense-tracker-stack-ExpenseTable-8LYNNT1YLLXA

      # S3 Configuration
      UPLOAD_BUCKET: expense-tracker-receipts-247006162678-us-east-1

      # SNS Configuration
      SNS_TOPIC_ARN: arn:aws:sns:us-east-1:247006162678:monthly-expense-summary

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}

    restart: unless-stopped
    networks:
      - expense-tracker-network

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3001/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  expense-tracker-network:
    driver: bridge
